<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peça a Ideia 💡</title>

<style>
body {
  background-color: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 20px;
}

h1 { font-size: 28px; margin-bottom: 20px; }
h2 { font-size: 22px; margin-top: 20px; }

p, li {
  font-size: 16px;
  line-height: 1.5;
}

ul, ol {
  text-align: left;
  display: inline-block;
  margin: 10px auto;
}

form {
  max-width: 500px;
  margin: 20px auto;
  text-align: left;
}

label {
  display: block;
  margin-top: 15px;
  font-weight: bold;
}

input, textarea, button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 5px;
  border: none;
  font-size: 16px;
}

button {
  background-color: yellow;
  color: black;
  font-weight: bold;
  margin-top: 20px;
  cursor: pointer;
}

button:hover {
  background-color: orange;
}
</style>
</head>

<body>

<h1>Peça a Ideia 💡</h1>
<p>Está travado? Falta ideia? Envie seu problema e receba uma solução prática direto no WhatsApp.</p>

<h2>Como funciona</h2>
<ol>
  <li>Preencha seus dados.</li>
  <li>Clique em Enviar Pedido.</li>
  <li>O WhatsApp abre com a mensagem pronta.</li>
  <li>Eu recebo e respondo com a ideia.</li>
</ol>

<form onsubmit="enviarWhatsApp(event)">
  <label for="nome">Nome completo:</label>
  <input type="text" id="nome" required>

  <label for="email">E-mail:</label>
  <input type="email" id="email" required>

  <label for="telefone">Telefone com DDD:</label>
  <input type="tel" id="telefone" required>

  <label for="pedido">Descreva seu problema:</label>
  <textarea id="pedido" rows="4" required></textarea>

  <button type="submit">Enviar Pedido</button>
</form>

<script>
function enviarWhatsApp(e){
  e.preventDefault();

  var nome = document.getElementById("nome").value.trim();
  var email = document.getElementById("email").value.trim();
  var telefone = document.getElementById("telefone").value.trim();
  var pedido = document.getElementById("pedido").value.trim();

  var numero = "5511979872476"; // seu número com 55 + DDD + número

  var texto =
    "💡 Novo Pedido - Peça a Ideia\n\n" +
    "Nome: " + nome + "\n" +
    "E-mail: " + email + "\n" +
    "Telefone: " + telefone + "\n\n" +
    "Problema:\n" + pedido;

  var url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(texto);

  window.open(url, "_blank");
}
</script>

</body>
</html>
